[env:auraos]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

board_build.flash_mode = qio
board_build.psram_type = opi
board_build.arduino.memory_type = qio_opi
board_build.psram = enabled
board_upload.flash_size = 32MB
board_build.partitions = partitions.csv

monitor_speed = 115200
upload_port = /dev/cu.usbmodem14101
monitor_port = /dev/cu.usbmodem14101

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -I include
    -I lib/Core/DisplayManager
    -I lib/Core/TouchManager
    -I lib/Core/EventManager
    -I lib/Core/AppManager
    -I lib/Core/PowerManager
    -I lib/Core/SettingsManager
    -I lib/Widgets/Button
    -I lib/Widgets/Label
    -I lib/Widgets/Card
    -I lib/Widgets/StatusBar
    -I lib/Widgets/NavigationBar
    -I lib/Apps/Home
    -I lib/Apps/Settings

lib_ldf_mode = deep
lib_extra_dirs =
    lib/Core
    lib/Widgets
    lib/Apps

lib_deps =
    moononournation/GFX Library for Arduino@^1.4.9
    bblanchon/ArduinoJson@^7.0.0
